<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Vol 7 Test 6 - Song ngữ Anh Việt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Georgia', 'Times New Roman', serif;
        }

        body {
            background: #2c3e50;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 12px;
        }

        .app-container {
            width: 100%;
            max-width: 1600px;
            background: #ecf0f1;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            height: 95vh;
        }

        /* Reading mode */
        .app-container.reading-mode {
            background: #f8f5e6;
        }
        .app-container.reading-mode .col-content {
            background: #fffaf0;
        }
        .app-container.reading-mode .col-header {
            background: #d6cdb8;
            color: #3a2e1f;
        }
        .app-container.reading-mode .status-bar {
            background: #d6cdb8;
        }

        /* Header */
        .app-header {
            background: linear-gradient(145deg, #1e3a5f 0%, #0f2a44 100%);
            color: white;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #e6b422;
            flex-wrap: wrap;
            gap: 10px;
        }

        .brand h1 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #e6b422;
        }

        .passage-selector {
            display: flex;
            gap: 10px;
            background: #1a2f44;
            padding: 6px 12px;
            border-radius: 40px;
            border: 1px solid #e6b422;
        }

        .passage-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .passage-btn:hover {
            background: #2d4b77;
        }

        .passage-btn.active {
            background: #e6b422;
            color: #1e3a5f;
        }


        .reading-mode-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #2d4b77;
            padding: 4px 12px;
            border-radius: 30px;
            cursor: pointer;
            margin-left: 15px;
        }
        .toggle-switch {
            width: 40px;
            height: 20px;
            background: #0f2a44;
            border-radius: 20px;
            position: relative;
            transition: 0.3s;
            border: 1px solid #e6b422;
        }
        .toggle-switch.active {
            background: #e6b422;
        }
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }
        .toggle-switch.active::after {
            left: 22px;
        }

        .font-controls {
            display: flex;
            gap: 5px;
            background: #2d4b77;
            padding: 3px;
            border-radius: 30px;
            margin-left: 15px;
        }
        .font-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .font-btn:hover {
            background: #3e5f8a;
        }
        .font-btn.active {
            background: #e6b422;
            color: #1e3a5f;
        }

        .header-controls {
            display: flex;
            align-items: center;
        }

        /* Main area with resizable columns */
        .main-area {
            display: flex;
            flex: 1;
            overflow: hidden;
            background: #bdc3c7;
        }

        .column {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: white;
        }

        .column.en-column {
            width: 50%;
        }

        .column.vi-column {
            width: 50%;
        }

        .col-header {
            background: #d2cbbc;
            padding: 10px 18px;
            font-weight: 700;
            color: #1e3a5f;
            border-bottom: 2px solid #b0aa9a;
            font-size: 1rem;
        }

        .col-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            line-height: 1.8;
            font-size: 16px;
            background: #fffcf5;
        }

        /* Resizer */
        .resizer {
            width: 8px;
            background: #b0aa9a;
            cursor: col-resize;
            transition: 0.1s;
        }
        .resizer:hover {
            background: #e6b422;
        }

        /* Font size classes */
        .col-content.font-small {
            font-size: 14px;
        }
        .col-content.font-medium {
            font-size: 16px;
        }
        .col-content.font-large {
            font-size: 18px;
        }

        /* Typography */
        .col-content h1, .col-content h2 {
            font-size: 1.9rem;
            color: #1e3a5f;
            border-bottom: 2px solid #e6b422;
            padding-bottom: 8px;
            margin-bottom: 20px;
        }
        .col-content h3 {
            font-size: 1.4rem;
            color: #2d4b77;
            margin: 25px 0 15px;
        }
        .col-content p {
            margin-bottom: 18px;
            text-align: justify;
        }
        .col-content em {
            color: #5d3a1a;
            font-style: italic;
        }
        .col-content strong {
            color: #1e3a5f;
        }
        .col-content .paragraph-label {
            font-weight: 700;
            color: #1e3a5f;
            margin-right: 8px;
        }

        /* Right-click menu */
        .context-menu {
            position: fixed;
            background: white;
            border: 1px solid #9a8c7a;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            padding: 5px 0;
            border-radius: 8px;
            z-index: 10000;
            display: none;
            min-width: 160px;
        }
        .context-menu div {
            padding: 8px 20px;
            cursor: pointer;
        }
        .context-menu div:hover {
            background: #1e3a5f;
            color: white;
        }

        /* Highlight colors */
        .highlight-yellow {
            background-color: #f9e79f;
            border-radius: 3px;
        }
        .highlight-green {
            background-color: #a9d6b0;
            border-radius: 3px;
        }
        .highlight-pink {
            background-color: #fbb9c0;
            border-radius: 3px;
        }

        /* Status bar (timer removed) */
        .status-bar {
            background: #d2cbbc;
            padding: 8px 24px;
            display: flex;
            gap: 24px;
            align-items: center;
            border-top: 1px solid #b0aa9a;
            font-size: 0.9rem;
            color: #1e3a5f;
            flex-wrap: wrap;
        }

        .btn {
            padding: 4px 16px;
            border: none;
            border-radius: 30px;
            background: #1e3a5f;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn:hover {
            background: #2d4b77;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #1e3a5f;
            color: #1e3a5f;
        }
        .btn-outline:hover {
            background: #1e3a5f;
            color: white;
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- Header -->
    <div class="app-header">
        <div class="brand">
            <h1>IELTS Vol 7 · Test 6</h1>
        </div>
        <div class="passage-selector" id="passageSelector">
            <button class="passage-btn active" data-passage="1">Passage 1</button>
            <button class="passage-btn" data-passage="2">Passage 2</button>
            <button class="passage-btn" data-passage="3">Passage 3</button>
        </div>
        <div class="header-controls">
            <div class="reading-mode-toggle" id="readingModeToggle">
                <div class="toggle-switch" id="toggleSwitch"></div>
                <span class="toggle-label">Đọc sách</span>
            </div>
            <div class="font-controls">
                <button class="font-btn" id="fontSmall">A-</button>
                <button class="font-btn active" id="fontMedium">A</button>
                <button class="font-btn" id="fontLarge">A+</button>
            </div>
           
        </div>
    </div>

    <!-- Main resizable columns -->
    <div class="main-area" id="mainArea">
        <!-- Cột gốc -->
        <div class="column en-column" id="enColumn">
            <div class="col-header">Bản gốc</div>
            <div class="col-content font-medium" id="enContent"></div>
        </div>
        <div class="resizer" id="resizer"></div>
        <!-- Cột dịch -->
        <div class="column vi-column" id="viColumn">
            <div class="col-header">Bản dịch</div>
            <div class="col-content font-medium" id="viContent"></div>
        </div>
    </div>

    <!-- Status bar (no timer) -->
    <div class="status-bar">
        <span>Bôi đen văn bản → nhấp chuột phải để highlight màu</span>
        <button class="btn btn-outline" id="resetHighlightBtn">Xóa tất cả highlight</button>
        <button class="btn btn-outline" id="syncScrollBtn" style="background: #e6b422; color: #1e3a5f; border: 1px solid #1e3a5f;">Đồng bộ cuộn: BẬT</button>
    </div>

    <!-- Right-click menu -->
    <div class="context-menu" id="contextMenu">
        <div onclick="applyHighlight('yellow')">Highlight vàng</div>
        <div onclick="applyHighlight('green')">Highlight xanh lá</div>
        <div onclick="applyHighlight('pink')">Highlight hồng</div>
        <div onclick="removeHighlight()">Xóa highlight đoạn chọn</div>
    </div>
</div>

<script>
    (function() {
        // DỮ LIỆU PASSAGE 1,2,3 (Vol 7 Test 6)
        const passages = {
            1: {
                en: [
                    "<h1>Deep sea discovery</h1>",
                    "<p><em>Recent research has provided new insights into how fish communicate</em></p>",
                    "<p><strong>A</strong> Nico Michiels is an ecologist from the University of Tubingen in Germany who spends part of each year in Egypt, where he dives in the Red Sea, observing fish life and gathering data on its coral reefs. In September 2007 he decided to find out how far red light could penetrate the ocean depths. Seawater absorbs different colours at different depths, and as an experienced diver, Michiels was aware that red light is extinguished not far below the surface whereas blue-green light penetrates deeper. To find out the depth at which red disappeared in this particular ocean, however, he attached a special plastic filter to his dive mask which was designed to block out all colours except red. Then he began to descend. In theory, once he reached about 15 metres, he should have been plunged into darkness. Instead, something totally unexpected happened. Sure enough, 20 metres down it was as dark as night. ‘All the fish disappeared. With no light from the surface, they were effectively black and had become invisible,’ he says. ‘But it didn’t stay black for long. Then I saw a group of goby fish with bright red eyes lit up against the background. After that red spots began to show up all over the reef.’</p>",
                    "<p><strong>B</strong> Even with the red filter removed, Michiels could pick them out without much trouble once his eyes grew accustomed to the gloom. It seems strange that no diver or researcher had spotted all this red before, but as Michiels points out, no one saw it because no one expected to see it. On that one dive Michiels discovered three fish species with prominent red markings, and has found many others since.</p>",
                    "<p><strong>C</strong> But how can fish appear red where there’s no red light? Ordinary red pigments* look red because they reflect red light while absorbing all other wavelengths. At 20 metres down, there had to be some other explanation for the red Michiels was seeing. He suspected fluorescence. Fluorescent pigments behave differently from ordinary ones: they receive incoming light of one wavelength, for example blue, and emit light of a longer wavelength, in this case red. On the reef in the Red Sea during daytime, the most likely explanation was that the predominantly blue and green wavelengths at depth triggered the emission of fluorescent red in the fish.</p>",
                    "<p><strong>D</strong> With only a week left in Egypt, and lacking the equipment to confirm that the fish were fluorescent, Michiels photographed as many of them as he could. Then once back in Germany, he bought an assortment of tropical fish and installed them in his lab. Here he confirmed that the fish did indeed fluoresce. In most of the fish he looked at, the fluorescence could be traced to specialised pigment cells that lie in the skin beneath the scales. These cells contain ‘guanine crystals’, which scatter light to give fish their silvery sheen. However, Michiels says they are still not sure exactly what is fluorescing. ‘It’s not the crystals themselves. It’s probably a fluorescent protein built into the crystals, and we have a suspicion that it might be made by bacteria.’</p>",
                    "<p><strong>E</strong> Intrigued, Michiels began a systematic search for red fluorescence in reef fish. He and his colleagues, Nils Anthes and Dennis Sprenger, have identified some 50 species with red fluorescence. The most common markings tend to be on the body towards the head and to a lesser extent around the eyes, and then the fins. To Michiels, the distribution of these markings is one of the strongest indications that red fluorescence has a very particular function: communication with other members of the species. According to several recent studies, a whole range of animals employ fluorescence as a natural highlighter to boost the visibility of body parts they use to signal, for example to ward off enemies. In reef fish, the red tends to be confined to parts of the body used to signal, suggesting these markings serve a similar function. But instead of highlighting an existing colour, the fluorescence gives the fish a colour that otherwise wouldn’t exist. For example, fish commonly use eye rings to signal that they are present and their direction of gaze, and Michiels suspects that red-eyed gobies use signals to indicate their location and keep their group together.</p>",
                    "<p><strong>F</strong> Red light, whatever its source, doesn’t travel far through water, which suggests signals are intended to be private, seen only by nearby fish of the right species. There are several lines of evidence to support this, says Michiels. And closely related species do not have completely identical markings, which suggests they might be important in species recognition.</p>",
                    "<p><strong>G</strong> Michiels suspects red fluorescence has another important role for some reef fish: helping them blend in. During his first dive with the red filter, he noticed corals glow a dark but faint red too. Against this irregular red background, a fish that glows red all over would be hard to distinguish. More compelling for Michiels is the case of the scorpionfish, which lies perfectly still until food swims past which it then sucks in.</p>",
                    "<p><strong>H</strong> Yet if red plays any part in a fish’s life then it must be able to see it. Fish that live in a world dominated by blue-green light are assumed to have eyes tuned to those wavelengths, and most marine fish that have been studied are thought incapable of seeing red. One exception is the seahorse, whose eyes are sensitive to red. As for the other fish, it remains to be seen.</p>",
                    "<p><em>*pigments: a pigment is a substance that gives something a particular colour</em></p>"
                ],
                vi: [
                    "<h1>Khám phá biển sâu</h1>",
                    "<p><em>Nghiên cứu gần đây đã cung cấp những hiểu biết mới về cách cá giao tiếp</em></p>",
                    "<p><strong>A</strong> Nico Michiels là nhà sinh thái học tại Đại học Tübingen (Đức), mỗi năm dành một phần thời gian ở Ai Cập để lặn biển Đỏ, quan sát đời sống cá và thu thập dữ liệu về các rạn san hô. Vào tháng 9 năm 2007, ông quyết định tìm hiểu xem ánh sáng đỏ có thể xuyên sâu đến đâu trong lòng đại dương. Nước biển hấp thụ các màu sắc khác nhau ở các độ sâu khác nhau, và là một thợ lặn giàu kinh nghiệm, Michiels biết rằng ánh sáng đỏ bị triệt tiêu không xa dưới mặt nước trong khi ánh sáng xanh lục lam xuyên sâu hơn. Để tìm ra độ sâu mà màu đỏ biến mất trong vùng biển cụ thể này, ông đã gắn một bộ lọc nhựa đặc biệt lên mặt nạ lặn, được thiết kế để chặn mọi màu sắc ngoại trừ màu đỏ. Sau đó, ông bắt đầu lặn xuống. Về lý thuyết, khi chạm đến khoảng 15 mét, ông sẽ chìm trong bóng tối. Thay vào đó, một điều hoàn toàn bất ngờ đã xảy ra. Đúng vậy, ở độ sâu 20 mét, mọi thứ tối đen như mực. 'Tất cả cá đều biến mất. Không có ánh sáng từ mặt nước, chúng trở nên đen tuyền và không thể nhìn thấy,' ông nói. 'Nhưng bóng tối không kéo dài lâu. Rồi tôi nhìn thấy một nhóm cá bống với đôi mắt đỏ rực sáng lên trên nền tối. Sau đó, những đốm đỏ bắt đầu xuất hiện khắp rạn san hô.'</p>",
                    "<p><strong>B</strong> Ngay cả khi tháo bộ lọc đỏ, Michiels vẫn có thể phân biệt chúng khá dễ dàng sau khi mắt ông đã quen với bóng tối. Có vẻ lạ là chưa thợ lặn hay nhà nghiên cứu nào phát hiện ra màu đỏ này trước đây, nhưng Michiels chỉ ra rằng không ai nhìn thấy vì không ai kỳ vọng thấy nó. Trong một lần lặn đó, Michiels đã phát hiện ba loài cá có các mảng đỏ nổi bật, và sau đó tìm thấy nhiều loài khác.</p>",
                    "<p><strong>C</strong> Nhưng làm thế nào cá có thể hiện màu đỏ khi không có ánh sáng đỏ? Các sắc tố đỏ thông thường trông có màu đỏ vì chúng phản xạ ánh sáng đỏ và hấp thụ mọi bước sóng khác. Ở độ sâu 20 mét, phải có một lời giải thích khác cho màu đỏ mà Michiels thấy. Ông nghi ngờ đó là hiện tượng huỳnh quang. Sắc tố huỳnh quang hoạt động khác với sắc tố thường: chúng nhận ánh sáng tới ở một bước sóng, ví dụ xanh lam, và phát ra ánh sáng ở bước sóng dài hơn, trong trường hợp này là đỏ. Trên rạn san hô ở Biển Đỏ ban ngày, lời giải thích hợp lý nhất là các bước sóng xanh lam và xanh lục chiếm ưu thế ở độ sâu đã kích hoạt phát xạ huỳnh quang đỏ ở cá.</p>",
                    "<p><strong>D</strong> Chỉ còn một tuần ở Ai Cập, và không có thiết bị để xác nhận cá có huỳnh quang hay không, Michiels đã chụp ảnh càng nhiều càng tốt. Khi trở về Đức, ông mua một bộ cá nhiệt đới và nuôi trong phòng thí nghiệm. Tại đây, ông xác nhận rằng cá thực sự phát huỳnh quang. Ở hầu hết các con cá ông xem xét, huỳnh quang có thể bắt nguồn từ các tế bào sắc tố chuyên biệt nằm dưới vảy. Các tế bào này chứa 'tinh thể guanine', chúng khuếch tán ánh sáng tạo cho cá vẻ sáng bạc. Tuy nhiên, Michiels cho biết họ vẫn chưa chắc chắn điều gì phát huỳnh quang. 'Đó không phải bản thân tinh thể. Có lẽ là một protein huỳnh quang gắn trong tinh thể, và chúng tôi nghi ngờ nó có thể do vi khuẩn tạo ra.'</p>",
                    "<p><strong>E</strong> Bị hấp dẫn, Michiels bắt đầu tìm kiếm có hệ thống về huỳnh quang đỏ ở cá rạn. Ông và các đồng nghiệp Nils Anthes và Dennis Sprenger đã xác định được khoảng 50 loài có huỳnh quang đỏ. Các mảng màu thường gặp nhất ở phần thân gần đầu, ít hơn ở quanh mắt, và sau đó là vây. Đối với Michiels, sự phân bố này là một trong những chỉ dấu mạnh mẽ nhất rằng huỳnh quang đỏ có một chức năng rất đặc biệt: giao tiếp với các thành viên cùng loài. Theo một số nghiên cứu gần đây, nhiều loài động vật sử dụng huỳnh quang như một công cụ làm nổi bật tự nhiên để tăng độ nhìn thấy của các bộ phận cơ thể dùng để phát tín hiệu, chẳng hạn để xua đuổi kẻ thù. Ở cá rạn, màu đỏ thường chỉ giới hạn ở các bộ phận cơ thể dùng để phát tín hiệu, gợi ý rằng các mảng này có chức năng tương tự. Nhưng thay vì làm nổi bật màu sắc có sẵn, huỳnh quang mang lại cho cá một màu sắc mà nếu không thì không tồn tại. Ví dụ, cá thường dùng vòng mắt để báo hiệu sự hiện diện và hướng nhìn, và Michiels nghi ngờ cá bống mắt đỏ dùng tín hiệu để chỉ vị trí và giữ đàn.</p>",
                    "<p><strong>F</strong> Ánh sáng đỏ, dù từ nguồn nào, không truyền xa trong nước, điều này gợi ý rằng các tín hiệu chỉ dành cho phạm vi riêng tư, chỉ được nhìn thấy bởi những con cá cùng loài ở gần. Michiels cho biết có nhiều bằng chứng ủng hộ điều này. Và các loài có quan hệ gần gũi không có các mảng màu hoàn toàn giống nhau, điều này gợi ý chúng có thể quan trọng trong việc nhận biết loài.</p>",
                    "<p><strong>G</strong> Michiels nghi ngờ huỳnh quang đỏ còn có một vai trò quan trọng khác đối với một số cá rạn: giúp chúng hòa mình. Trong lần lặn đầu tiên với kính lọc đỏ, ông nhận thấy san hô cũng phát sáng đỏ nhạt. Trên nền đỏ không đều này, một con cá phát sáng đỏ khắp thân sẽ khó phân biệt. Thuyết phục hơn đối với Michiels là trường hợp của cá mù làn, chúng nằm bất động cho đến khi con mồi bơi qua và hút vào.</p>",
                    "<p><strong>H</strong> Tuy nhiên, nếu màu đỏ đóng vai trò gì đó trong đời sống của cá thì chúng phải có khả năng nhìn thấy nó. Cá sống trong thế giới chủ yếu là ánh sáng xanh lam lục được cho là có mắt điều chỉnh theo các bước sóng đó, và hầu hết cá biển đã được nghiên cứu được cho là không thể nhìn thấy đỏ. Một ngoại lệ là cá ngựa, mắt của chúng nhạy cảm với đỏ. Đối với các loài cá khác, điều này vẫn còn phải xem xét.</p>",
                    "<p><em>*pigments: sắc tố là chất tạo màu cho vật thể</em></p>"
                ]

            2: {
                en: [
                    "<h1>Jellyfish – The Dominant Species</h1>",
                    "<p><strong>A</strong><br>Jellyfish have become the curse of beach holidays, permeating every ocean on the globe, thriving in the Arctic and the tropics. In an ever-changing world where other species struggle to endure, jellyfish populations are on the rise. To the untrained eye, these creatures drift aimlessly on the oceans’ currents and appear benign. In addition, they lack sharp claws, piercing teeth or even a brain. Despite this, they are armed with an amazing arsenal of weapons, especially the stinging power of their tentacles. As a result, jellyfish are among the most-feared, least-understood creatures in the seas.</p>",
                    "<p><strong>B</strong><br>According to Dr Monty Graham, a jellyfish scientist at the University of South Alabama, US, ‘Jellyfish are a pretty good group of animals to track coastal ecosystems. When you start to see jellyfish numbers grow, that usually indicates a stressed system.’ While populations appear to be down this year, Dr Graham sees ‘a statistically solid increase’ over the longer term. This increase first gained attention in the 1980s when a huge number of jellyfish, Atlantic Ocean natives named Mnemiopsis leidyi, devastated the Black Sea, an ecosystem already weakened by overfishing of anchovies. Scientists believe that this species of jellyfish came in on the bottom of a ship and then rapidly multiplied, feeding on anchovy eggs and the plankton that young fish rely on.</p>",
                    "<p><strong>C</strong><br>Dense jellyfish aggregations can be a natural feature of healthy ocean ecosystems, but a clear picture is now emerging of more severe and frequent jellyfish outbreaks worldwide. Dr Anthony Richardson, from the University of Queensland, Australia, explains that once jellyfish gain a foothold, if conditions are right they can establish a massive population at the expense of other ocean life. The problem is that parts of the ocean might switch from being dominated by fish to being dominated by jellyfish.</p>",
                    "<p><strong>D</strong><br>A study done by Richardson and his colleagues explores the causes behind jellyfish infestation, and the need for swift, decisive action to stem jellyfish takeover. Jellyfish outbreaks are linked directly to human actions, including overfishing, the input of fertilizer and sewage into the ocean, and climate change. Overfishing has removed fish from marine ecosystems at astounding rates. According to Richardson, this has made it possible for jellyfish to take their place. ‘This is because small fish appear to keep jellyfish in check by predation (on jellyfish when they are very small) and competition (when feeding). So, once we remove fish, jellyfish can proliferate.’ Eutrophication is another human-caused change in the ocean that has likely contributed to jellyfish explosions. Eutrophication is an increase of nitrogen and phosphorus in the ocean, largely caused by fertilizer and waste run-off. This leads to algae blooms, which lower oxygen in the marine ecosystem, creating so-called ‘dead zones’, which have been increasing dramatically around the world. According to Richardson, these low-oxygen waters give jellyfish the advantage. ‘Fish avoid low-oxygen waters but jellyfish, having lower oxygen demands, not only survive but can thrive in these conditions as there is less predation and competition from fish.’</p>",
                    "<p><strong>E</strong><br>Furthermore, Richardson and his colleagues speculate that climate change may expand the traditional geographical range of jellyfish. ‘As water warms, tropical species are moving towards the poles. Many venomous jellyfish species are tropical and could move into more densely populated subtropical and temperate regions.’</p>",
                    "<p><strong>F</strong><br>Once jellyfish appear en masse in an ecosystem they can make it very difficult for fish to stage a comeback. By feeding on fish eggs, the jellyfish successfully prevent fish from returning to their normal population numbers, says Richardson. ‘One can thus think of two alternate states with each being stable: one dominated by fish and the other by jellyfish. Unfortunately, where there is a jellyfish-dominated state then this does not support the nutritional needs of other fish, marine mammals, and seabirds.’ In other words an ecosystem that loses fish also loses the species that depend on fish for survival. This state has been defined as a ‘monoculture of jellyfish’, an apt analogy since the situation shares similarities with other monocultures. When the rich biodiversity of tropical forests is replaced by plantations growing a single species of tree, an area of rich variety becomes a desert in terms of biodiversity, as do ocean ecosystems when jellyfish become the dominant species. One result of large jellyfish populations is the economic effect it has had on the fishing industry. In the Gulf of Mexico, shrimp fishermen are struggling with a jellyfish boom that fills nets, causing them to break and resulting in millions of dollars in losses.</p>",
                    "<p><strong>G</strong><br>Experts say that a greater understanding of jellyfish, including their ideal water temperature and feeding habits, is necessary to determine with certainty what is causing the recent massive invasion, and to come up with ways to combat it. Due to the difficulty of turning ecosystems around once jellyfish have become dominant, Richardson and his colleagues propose focusing on ‘prevention rather than cure’. They recommend a halt to overfishing small fish that are vital to keeping jellyfish in check, reducing the amount of fertilizer and sewage running off into the oceans, and finally, if possible, confronting climate change.</p>"
                ],
                vi: [
                    "<h1>Sứa – Loài thống trị</h1>",
                    "<p><strong>A</strong><br>Sứa đã trở thành nỗi ám ảnh của những kỳ nghỉ biển, xuất hiện khắp mọi đại dương, phát triển mạnh ở Bắc Cực và vùng nhiệt đới. Trong một thế giới không ngừng biến đổi, nơi các loài khác vật lộn để tồn tại, quần thể sứa đang gia tăng. Đối với mắt thường, những sinh vật này trôi dạt vô định trên các dòng hải lưu và có vẻ vô hại. Hơn nữa, chúng thiếu vuốt sắc, răng nhọn hay thậm chí là não. Mặc dù vậy, chúng được trang bị một kho vũ khí đáng kinh ngạc, đặc biệt là khả năng chích của các xúc tu. Kết quả là sứa nằm trong số những sinh vật biển đáng sợ nhất và ít được hiểu nhất.</p>",
                    "<p><strong>B</strong><br>Theo Tiến sĩ Monty Graham, nhà nghiên cứu sứa tại Đại học South Alabama (Mỹ), 'Sứa là một nhóm động vật khá tốt để theo dõi các hệ sinh thái ven biển. Khi bạn bắt đầu thấy số lượng sứa tăng, điều đó thường báo hiệu một hệ thống đang bị căng thẳng.' Mặc dù số lượng dường như giảm trong năm nay, Tiến sĩ Graham nhận thấy 'sự gia tăng có ý nghĩa thống kê' trong dài hạn. Sự gia tăng này lần đầu tiên được chú ý vào những năm 1980 khi một lượng lớn sứa, loài bản địa Đại Tây Dương tên Mnemiopsis leidyi, tàn phá Biển Đen, một hệ sinh thái vốn đã suy yếu do đánh bắt quá mức cá cơm. Các nhà khoa học tin rằng loài sứa này xâm nhập từ đáy tàu và sau đó sinh sôi nhanh chóng, ăn trứng cá cơm và sinh vật phù du mà cá con phụ thuộc.</p>",
                    "<p><strong>C</strong><br>Các tập hợp sứa dày đặc có thể là một đặc điểm tự nhiên của các hệ sinh thái đại dương khỏe mạnh, nhưng hiện nay đang xuất hiện một bức tranh rõ ràng về sự bùng phát sứa nghiêm trọng và thường xuyên hơn trên toàn cầu. Tiến sĩ Anthony Richardson từ Đại học Queensland, Australia, giải thích rằng một khi sứa đã bám trụ, nếu điều kiện thuận lợi, chúng có thể thiết lập một quần thể khổng lồ gây hại cho các sinh vật biển khác. Vấn đề là các khu vực đại dương có thể chuyển từ trạng thái bị chi phối bởi cá sang bị chi phối bởi sứa.</p>",
                    "<p><strong>D</strong><br>Một nghiên cứu do Richardson và các đồng nghiệp thực hiện khám phá nguyên nhân đằng sau sự xâm lấn của sứa và sự cần thiết của hành động nhanh chóng, dứt khoát để ngăn chặn sự thống trị của sứa. Sự bùng phát sứa liên quan trực tiếp đến hành động của con người, bao gồm đánh bắt quá mức, đưa phân bón và nước thải vào đại dương, và biến đổi khí hậu. Đánh bắt quá mức đã loại bỏ cá khỏi hệ sinh thái biển với tốc độ đáng kinh ngạc. Theo Richardson, điều này tạo điều kiện cho sứa chiếm chỗ. 'Đó là vì cá nhỏ dường như kiểm soát sứa bằng cách ăn thịt (sứa khi còn rất nhỏ) và cạnh tranh (khi kiếm ăn). Vì vậy, một khi chúng ta loại bỏ cá, sứa có thể sinh sôi nảy nở.' Phú dưỡng hóa là một thay đổi khác do con người gây ra trong đại dương có khả năng góp phần vào sự bùng nổ sứa. Phú dưỡng hóa là sự gia tăng nitơ và phốt pho trong đại dương, phần lớn do phân bón và chất thải chảy tràn. Điều này dẫn đến tảo nở hoa, làm giảm oxy trong hệ sinh thái biển, tạo ra cái gọi là 'vùng chết', đang gia tăng đáng kể trên khắp thế giới. Theo Richardson, những vùng nước ít oxy này tạo lợi thế cho sứa. 'Cá tránh vùng nước ít oxy nhưng sứa, có nhu cầu oxy thấp hơn, không chỉ sống sót mà còn có thể phát triển mạnh trong những điều kiện này vì ít bị ăn thịt và cạnh tranh từ cá.'</p>",
                    "<p><strong>E</strong><br>Hơn nữa, Richardson và các đồng nghiệp suy đoán rằng biến đổi khí hậu có thể mở rộng phạm vi địa lý truyền thống của sứa. 'Khi nước ấm lên, các loài nhiệt đới đang di chuyển về phía các cực. Nhiều loài sứa có nọc độc là loài nhiệt đới và có thể di chuyển vào các khu vực cận nhiệt đới và ôn đới đông dân cư hơn.'</p>",
                    "<p><strong>F</strong><br>Một khi sứa xuất hiện ồ ạt trong một hệ sinh thái, chúng có thể khiến cá rất khó phục hồi. Bằng cách ăn trứng cá, sứa ngăn chặn thành công sự trở lại của quần thể cá về mức bình thường, Richardson nói. 'Do đó, có thể hình dung hai trạng thái thay thế, mỗi trạng thái ổn định: một bị chi phối bởi cá và trạng thái kia bởi sứa. Thật không may, khi trạng thái sứa thống trị, nó không đáp ứng nhu cầu dinh dưỡng của các loài cá khác, động vật có vú biển và chim biển.' Nói cách khác, một hệ sinh thái mất cá cũng mất các loài phụ thuộc vào cá để tồn tại. Trạng thái này được gọi là 'độc canh sứa', một phép loại suy thích hợp vì tình huống có những điểm tương đồng với các hình thức độc canh khác. Khi đa dạng sinh học phong phú của rừng nhiệt đới bị thay thế bằng các đồn điền trồng một loài cây duy nhất, một khu vực đa dạng trở thành sa mạc về mặt đa dạng sinh học, cũng như các hệ sinh thái đại dương khi sứa trở thành loài thống trị. Một kết quả của quần thể sứa lớn là tác động kinh tế đối với ngành đánh bắt cá. Ở vịnh Mexico, ngư dân đánh bắt tôm đang vật lộn với sự bùng nổ sứa làm đầy lưới, khiến lưới bị hỏng và gây thiệt hại hàng triệu đô la.</p>",
                    "<p><strong>G</strong><br>Các chuyên gia cho rằng cần hiểu rõ hơn về sứa, bao gồm nhiệt độ nước lý tưởng và thói quen ăn uống của chúng, để xác định chắc chắn nguyên nhân gây ra sự xâm lấn hàng loạt gần đây và đưa ra cách chống lại nó. Do khó khăn trong việc xoay chuyển hệ sinh thái một khi sứa đã thống trị, Richardson và các đồng nghiệp đề xuất tập trung vào 'phòng ngừa hơn là chữa trị'. Họ khuyến nghị ngừng đánh bắt quá mức cá nhỏ, loài rất quan trọng để kiểm soát sứa, giảm lượng phân bón và nước thải chảy ra đại dương, và cuối cùng, nếu có thể, đối phó với biến đổi khí hậu.</p>"
                ]
            },
            3: {
                en: [
                    "<h1>The Pirahã people of Brazil</h1>",
                    "<p><em>The Pirahã language has stirred up debate among experts</em></p>",
                    "<p>The Pirahã tribe live deep in Brazil’s Amazon forest, and their language is hotly debated by linguists. Since 1977, the ethnologist Daniel Everett has spent a total of seven years living with the Pirahã and has committed his career to studying their puzzling speech. Indeed, he was uncertain for so long about what he was actually hearing while living among the Pirahã that he waited nearly three decades before publishing his findings.</p>",
                    "<p>The debate over the Pirahã language goes right to the core of the riddle regarding how Homo sapiens managed to develop vocal communication. Although bees dance, birds sing and whales even sing with syntax, human language is unique, if only for the reason that it enables humans to piece together never-before-constructed thoughts, and be infinitely imaginative – think of Shakespeare’s plays or Einstein’s theory of relativity.</p>",
                    "<p>Linguistics generally focuses on what features all human languages have in common, but the Pirahã language departs from what some academics have long maintained are essential and inalienable features of all human languages. Most of all, it may be unique for not employing subordinate clauses. Instead of saying, ‘When I have finished eating, I will speak to you,’ the Pirahã say, ‘I finish eating, I speak with you.’ Equally perplexing, the Pirahã appear not to use numbers. During the time he spent with them, Everett never heard words like ‘all’, ‘every’ and ‘more’. There is one word, ‘hoi’, that comes close to the numeral 1, but it can also mean ‘small’. And they were never observed to count without language, on their fingers for example, in order to determine important tasks in village life like how many pieces of meat to grill.</p>",
                    "<p>Everett’s findings among the Pirahã have brought new life to a controversial theory by the linguist Benjamin Whorf, who suggested that people are only capable of constructing thoughts for which they possess actual words. Or to put it another way, because they have no words for numbers, they cannot even begin to understand the concept of numbers or arithmetic.</p>",
                    "<p>The Warlpiri language – spoken by a group of Australian Aborigines – like that of the Pirahã, features only the most rudimentary system of counting. However, the Warlpiri people had no difficulty counting farther than three in a foreign language, in this case English, but when Everett attempted to teach the Pirahã how to count in Portuguese like other Brazilians, not a single person could count to 10.</p>",
                    "<p>Everett is at pains to point out that the Pirahã are not unintelligent, for their thinking is not any slower than that of the average university student. And although they reside in a remote part of the forest, they do not live in complete genetic isolation, but mix with people from the surrounding populations and share similar intellectual capacities with their neighbours whose languages do contain numbers.</p>",
                    "<p>Eventually, after some 30 years of research, Everett has come up with a surprising explanation for the peculiarities of the Pirahã language. Language, he believes, is created by a people’s way of life, their belief system and values. In this way, variety in human language is almost limitless, a function of the human capacity to live in different ways, such as in the forest. What Everett’s research has revealed is that the central tenet of the Pirahã culture is to live in the here and now. The only thing of importance that is worth communicating to others is what is being experienced at that very moment, though this can often be described with great care and detail. In consequence, the language has no means to conjugate verbs in order to describe ‘yesterday’ or ‘last week’ or ‘when I was a child’. Their very literal view of the world curtails abstract thought, and many features taken for granted among other peoples are absent among the Pirahã, such as a creation myth, story telling and painting. One manifestation of their beliefs is that by tradition the names they give their children are not particularly imaginative. Often they are named after other members of the tribe with whom they share similar character traits. Standing out or being different is not encouraged by the Pirahã, and this is reflected in their perhaps colourless choice of names.</p>",
                    "<p>Everett anticipated that these findings would be controversial and the reaction came as expected. Until this point, many linguists had defended the theories of Noam Chomsky, according to which all human languages have a universal grammar. What exactly makes up this universal grammar is the subject of debate, but at its heart is the concept of ‘recursion’, which is defined as replication of a structure within its single parts. Without it, humans would not be able to view separate thoughts as subordinate parts of a complex whole. And, most pertinent to Everett’s work, there would not be subordinate clauses, which are responsible for translating the concept of recursion into grammar. But if the Pirahã do not form subordinate clauses, then recursion cannot explain the uniqueness of human language, and this would negate Chomsky’s theories.</p>",
                    "<p>The logical way forward now would be to try to prove that the Pirahã can think in a recursive fashion. The only problem is, nobody can confirm or deny Everett’s observations since no other researcher can speak Pirahã as well as he does. Despite this, several researchers – including two of Chomsky’s colleagues – will soon travel to Brazil to check his claims. My concern is that soon the Pirahã will simply become one more scientific oddity with every aspect of their lives being exploited and analysed.</p>"
                ],
                vi: [
                    "<h1>Người Pirahã ở Brazil</h1>",
                    "<p><em>Ngôn ngữ Pirahã đã làm dấy lên cuộc tranh luận giữa các chuyên gia</em></p>",
                    "<p>Bộ tộc Pirahã sống sâu trong rừng Amazon của Brazil, và ngôn ngữ của họ là chủ đề gây tranh cãi gay gắt giữa các nhà ngôn ngữ học. Từ năm 1977, nhà dân tộc học Daniel Everett đã dành tổng cộng bảy năm sống với người Pirahã và dành cả sự nghiệp để nghiên cứu thứ tiếng nói khó hiểu của họ. Thực tế, ông đã không chắc chắn trong một thời gian dài về những gì mình thực sự nghe được khi sống giữa người Pirahã đến nỗi ông đợi gần ba thập kỷ mới công bố phát hiện của mình.</p>",
                    "<p>Cuộc tranh luận về ngôn ngữ Pirahã đi thẳng vào trung tâm của câu đố về cách Homo sapiens phát triển giao tiếp bằng lời nói. Mặc dù ong nhảy múa, chim hót và cá voi thậm chí hót với cú pháp, ngôn ngữ con người là duy nhất, nếu chỉ vì lý do nó cho phép con người ghép nối những suy nghĩ chưa từng được xây dựng trước đây và vô cùng sáng tạo – hãy nghĩ đến các vở kịch của Shakespeare hay thuyết tương đối của Einstein.</p>",
                    "<p>Ngôn ngữ học thường tập trung vào những đặc điểm chung của mọi ngôn ngữ, nhưng tiếng Pirahã lại tách rời khỏi những gì một số học giả từ lâu cho là đặc điểm thiết yếu và bất khả xâm phạm của mọi ngôn ngữ. Trên hết, nó có thể là duy nhất ở chỗ không sử dụng mệnh đề phụ. Thay vì nói, 'Khi tôi ăn xong, tôi sẽ nói chuyện với bạn,' người Pirahã nói, 'Tôi ăn xong, tôi nói với bạn.' Cũng gây bối rối không kém, người Pirahã dường như không sử dụng số. Trong thời gian sống với họ, Everett chưa bao giờ nghe những từ như 'tất cả', 'mọi' và 'hơn'. Có một từ, 'hoi', gần với số 1, nhưng nó cũng có thể có nghĩa là 'nhỏ'. Và họ chưa bao giờ được quan sát thấy đếm mà không có ngôn ngữ, ví dụ bằng ngón tay, để xác định các công việc quan trọng trong đời sống làng như bao nhiêu miếng thịt cần nướng.</p>",
                    "<p>Những phát hiện của Everett ở người Pirahã đã thổi luồng sinh khí mới vào một lý thuyết gây tranh cãi của nhà ngôn ngữ học Benjamin Whorf, người cho rằng con người chỉ có thể xây dựng những suy nghĩ mà họ có từ ngữ thực tế để diễn đạt. Nói cách khác, vì họ không có từ cho số, họ thậm chí không thể bắt đầu hiểu khái niệm về số hay số học.</p>",
                    "<p>Ngôn ngữ Warlpiri – được nói bởi một nhóm thổ dân Úc – giống như tiếng Pirahã, chỉ có hệ thống đếm thô sơ nhất. Tuy nhiên, người Warlpiri không gặp khó khăn khi đếm xa hơn ba bằng ngoại ngữ, trong trường hợp này là tiếng Anh, nhưng khi Everett cố gắng dạy người Pirahã đếm bằng tiếng Bồ Đào Nha như những người Brazil khác, không một ai có thể đếm đến 10.</p>",
                    "<p>Everett hết sức nhấn mạnh rằng người Pirahã không kém thông minh, vì tư duy của họ không chậm hơn so với sinh viên đại học trung bình. Và mặc dù họ sống ở vùng xa xôi của rừng già, họ không sống biệt lập hoàn toàn về mặt di truyền, mà giao thoa với những người từ các quần thể xung quanh và chia sẻ năng lực trí tuệ tương tự với những người hàng xóm có ngôn ngữ chứa số.</p>",
                    "<p>Cuối cùng, sau khoảng 30 năm nghiên cứu, Everett đã đưa ra một lời giải thích đáng ngạc nhiên cho những điểm đặc biệt của ngôn ngữ Pirahã. Ông tin rằng ngôn ngữ được tạo ra bởi lối sống, hệ thống tín ngưỡng và giá trị của một dân tộc. Bằng cách này, sự đa dạng trong ngôn ngữ con người gần như vô hạn, một chức năng của khả năng con người sống theo những cách khác nhau, chẳng hạn như trong rừng. Điều mà nghiên cứu của Everett tiết lộ là nguyên lý trung tâm của văn hóa Pirahã là sống ở đây và bây giờ. Điều duy nhất quan trọng đáng để giao tiếp với người khác là những gì đang được trải nghiệm ngay tại thời điểm đó, mặc dù điều này thường có thể được mô tả rất cẩn thận và chi tiết. Kết quả là ngôn ngữ không có phương tiện để chia động từ nhằm diễn tả 'hôm qua' hay 'tuần trước' hay 'khi tôi còn nhỏ'. Cách nhìn thế giới rất thực tế của họ hạn chế tư duy trừu tượng, và nhiều đặc điểm được coi là hiển nhiên ở các dân tộc khác lại không có ở người Pirahã, chẳng hạn như thần thoại sáng thế, kể chuyện và hội họa. Một biểu hiện của tín ngưỡng của họ là theo truyền thống, những cái tên họ đặt cho con cái không đặc biệt giàu trí tưởng tượng. Thông thường chúng được đặt theo tên các thành viên khác trong bộ lạc có cùng đặc điểm tính cách. Nổi bật hay khác biệt không được khuyến khích bởi người Pirahã, và điều này được phản ánh trong cách chọn tên có phần nhạt nhẽo của họ.</p>",
                    "<p>Everett đã dự đoán rằng những phát hiện này sẽ gây tranh cãi và phản ứng đến như dự kiến. Cho đến thời điểm này, nhiều nhà ngôn ngữ học đã bảo vệ các lý thuyết của Noam Chomsky, theo đó mọi ngôn ngữ con người đều có một ngữ pháp phổ quát. Chính xác điều gì tạo nên ngữ pháp phổ quát này là chủ đề tranh luận, nhưng cốt lõi của nó là khái niệm 'đệ quy', được định nghĩa là sự lặp lại một cấu trúc trong chính các bộ phận của nó. Nếu không có nó, con người sẽ không thể coi các suy nghĩ riêng rẽ như các bộ phận phụ thuộc của một tổng thể phức tạp. Và, liên quan nhất đến công trình của Everett, sẽ không có mệnh đề phụ, thứ chịu trách nhiệm chuyển khái niệm đệ quy vào ngữ pháp. Nhưng nếu người Pirahã không hình thành mệnh đề phụ, thì đệ quy không thể giải thích tính duy nhất của ngôn ngữ con người, và điều này sẽ phủ nhận các lý thuyết của Chomsky.</p>",
                    "<p>Cách tiến triển hợp lý bây giờ là cố gắng chứng minh rằng người Pirahã có thể tư duy theo cách đệ quy. Vấn đề duy nhất là không ai có thể xác nhận hay phủ nhận các quan sát của Everett vì không có nhà nghiên cứu nào khác nói tiếng Pirahã tốt như ông. Mặc dù vậy, một số nhà nghiên cứu – bao gồm hai đồng nghiệp của Chomsky – sẽ sớm đến Brazil để kiểm tra các tuyên bố của ông. Mối lo ngại của tôi là chẳng mấy chốc người Pirahã sẽ chỉ trở thành một sự kỳ lạ khoa học nữa, với mọi khía cạnh trong đời sống của họ bị khai thác và phân tích.</p>"
                ]
            }
        };

        // Variables
        let currentPassage = 1;
        let readingMode = false;
        
        // DOM elements
        const enDiv = document.getElementById('enContent');
        const viDiv = document.getElementById('viContent');
        const appContainer = document.getElementById('appContainer');
        const toggleSwitch = document.getElementById('toggleSwitch');
        const readingModeToggle = document.getElementById('readingModeToggle');

        // Load passage
        function loadPassage(id) {
            const p = passages[id];
            if (!p) return;
            
            let enHtml = '';
            p.en.forEach(para => {
                enHtml += para;
            });
            enDiv.innerHTML = enHtml;

            let viHtml = '';
            p.vi.forEach(para => {
                viHtml += para;
            });
            viDiv.innerHTML = viHtml;
        }

        loadPassage(1);

        // Passage selector
        document.querySelectorAll('.passage-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.passage-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const id = parseInt(btn.getAttribute('data-passage'), 10);
                currentPassage = id;
                loadPassage(id);
            });
        });

        // Reading mode toggle
        readingModeToggle.addEventListener('click', () => {
            readingMode = !readingMode;
            if (readingMode) {
                appContainer.classList.add('reading-mode');
                toggleSwitch.classList.add('active');
            } else {
                appContainer.classList.remove('reading-mode');
                toggleSwitch.classList.remove('active');
            }
        });

        // Font size controls
        document.getElementById('fontSmall').addEventListener('click', () => setFontSize('small'));
        document.getElementById('fontMedium').addEventListener('click', () => setFontSize('medium'));
        document.getElementById('fontLarge').addEventListener('click', () => setFontSize('large'));

        function setFontSize(size) {
            document.querySelectorAll('.font-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`font${size.charAt(0).toUpperCase() + size.slice(1)}`).classList.add('active');
            
            const contents = document.querySelectorAll('.col-content');
            contents.forEach(el => {
                el.classList.remove('font-small', 'font-medium', 'font-large');
                el.classList.add(`font-${size}`);
            });
        }

        // Resize columns
        const resizer = document.getElementById('resizer');
        const enColumn = document.getElementById('enColumn');
        const viColumn = document.getElementById('viColumn');
        const mainArea = document.getElementById('mainArea');
        let isResizing = false;

        resizer.addEventListener('mousedown', () => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const rect = mainArea.getBoundingClientRect();
            let leftWidth = e.clientX - rect.left - 4;
            if (leftWidth < 200) leftWidth = 200;
            if (leftWidth > rect.width - 200) leftWidth = rect.width - 200;
            enColumn.style.width = leftWidth + 'px';
            viColumn.style.width = (rect.width - leftWidth - 8) + 'px';
        });

        document.addEventListener('mouseup', () => {
            isResizing = false;
            document.body.style.cursor = 'default';
        });

        // Right-click highlight
        const contextMenu = document.getElementById('contextMenu');
        let selectedRange = null;

        document.addEventListener('contextmenu', (e) => {
            const target = e.target;
            if (target.closest('.col-content')) {
                e.preventDefault();
                const selection = window.getSelection();
                if (selection.toString().trim()) {
                    selectedRange = selection.getRangeAt(0);
                    contextMenu.style.display = 'block';
                    contextMenu.style.left = e.pageX + 'px';
                    contextMenu.style.top = e.pageY + 'px';
                }
            }
        });

        document.addEventListener('click', () => {
            contextMenu.style.display = 'none';
        });

        window.applyHighlight = (color) => {
            if (!selectedRange) return;
            const span = document.createElement('span');
            span.className = `highlight-${color}`;
            try {
                const range = selectedRange.cloneRange();
                const contents = range.extractContents();
                span.appendChild(contents);
                range.insertNode(span);
            } catch (e) {
                alert('Không thể highlight vùng này.');
            }
            contextMenu.style.display = 'none';
            selectedRange = null;
        };

        window.removeHighlight = () => {
            if (!selectedRange) return;
            const range = selectedRange.cloneRange();
            document.querySelectorAll('.highlight-yellow, .highlight-green, .highlight-pink').forEach(h => {
                if (range.intersectsNode(h)) {
                    const parent = h.parentNode;
                    while (h.firstChild) parent.insertBefore(h.firstChild, h);
                    parent.removeChild(h);
                }
            });
            window.getSelection().removeAllRanges();
            contextMenu.style.display = 'none';
            selectedRange = null;
        };

        // Reset all highlights
        document.getElementById('resetHighlightBtn').addEventListener('click', () => {
            document.querySelectorAll('.highlight-yellow, .highlight-green, .highlight-pink').forEach(h => {
                const parent = h.parentNode;
                while (h.firstChild) parent.insertBefore(h.firstChild, h);
                parent.removeChild(h);
            });
        });

        // Đồng bộ cuộn có bật/tắt
        const enContent = document.getElementById('enContent');
        const viContent = document.getElementById('viContent');
        const syncBtn = document.getElementById('syncScrollBtn');

        let syncEnabled = true;
        let isSyncing = false;

        syncBtn.addEventListener('click', () => {
            syncEnabled = !syncEnabled;
            if (syncEnabled) {
                syncBtn.style.background = '#e6b422';
                syncBtn.style.color = '#1e3a5f';
                syncBtn.textContent = 'Đồng bộ cuộn: BẬT';
            } else {
                syncBtn.style.background = 'transparent';
                syncBtn.style.color = '#1e3a5f';
                syncBtn.textContent = 'Đồng bộ cuộn: TẮT';
            }
        });

        function syncScroll(source, target) {
            if (!syncEnabled || isSyncing) return;
            isSyncing = true;
            
            const sourceScrollRatio = source.scrollTop / (source.scrollHeight - source.clientHeight);
            target.scrollTop = sourceScrollRatio * (target.scrollHeight - target.clientHeight);
            
            isSyncing = false;
        }

        enContent.addEventListener('scroll', () => syncScroll(enContent, viContent));
        viContent.addEventListener('scroll', () => syncScroll(viContent, enContent));
    })();
</script>
</body>
</html>
